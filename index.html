<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  height: 100vh; overflow: hidden;
  background: linear-gradient(160deg, #ffffff 0%, #eef2ff 50%, #dbeafe 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex; flex-direction: column;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
}
.topbar .title { font-size: 18px; font-weight: 700; color: #111; }
.topbar svg { cursor: pointer; }
#welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.logo-box {
  width: 130px; height: 130px; border-radius: 30px;
  background: linear-gradient(135deg, #4c2889, #5b3fd4, #3b82f6);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 40px rgba(100,80,220,0.35);
}
.app-name { font-size: 32px; font-weight: 700; color: #111; }
#chat-area {
  flex: 1; overflow-y: auto; padding: 16px;
  display: none; flex-direction: column; gap: 10px;
}
.msg-user {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: white; padding: 12px 16px; border-radius: 20px 20px 4px 20px;
  max-width: 78%; align-self: flex-end; font-size: 15px; line-height: 1.5;
}
.msg-ai {
  background: white; color: #111; padding: 12px 16px;
  border-radius: 20px 20px 20px 4px; max-width: 78%;
  align-self: flex-start; font-size: 15px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); line-height: 1.5;
}
.msg-img { max-width: 200px; border-radius: 12px; display: block; margin-bottom: 6px; }
.bottom {
  flex-shrink: 0; padding: 10px 16px 28px;
  background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
}
.input-bar {
  display: flex; align-items: center;
  background: white; border-radius: 9999px;
  padding: 6px 6px 6px 14px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12); gap: 6px;
}
.input-bar input {
  flex: 1; border: none; outline: none;
  font-size: 16px; color: #111; background: transparent; min-width: 0;
}
.icon-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
}
.send-btn {
  width: 40px; height: 40px; min-width: 40px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #4f6ef7, #5b8def);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 2px 8px rgba(79,110,247,0.4); flex-shrink: 0;
}
.mic-active svg { stroke: #ef4444 !important; }
.sidebar {
  position: fixed; left: -280px; top: 0; width: 280px; height: 100vh;
  background: white; box-shadow: 4px 0 20px rgba(0,0,0,0.1);
  transition: left 0.3s; z-index: 100; display: flex; flex-direction: column; padding: 20px;
}
.sidebar.open { left: 0; }
.sidebar h3 { font-size: 14px; color: #888; margin-bottom: 12px; letter-spacing: 1px; }
.new-chat-btn {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: white; border: none; border-radius: 12px;
  padding: 12px; font-size: 15px; cursor: pointer; margin-bottom: 16px; width: 100%;
}
.chat-item {
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  color: #333; font-size: 14px; margin-bottom: 4px;
}
.chat-item:hover { background: #f5f5f5; }
.overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.3); z-index: 99; display: none;
}
.overlay.show { display: block; }
.upload-menu {
  position: absolute; bottom: 80px; left: 16px;
  background: white; border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  padding: 8px; display: none; flex-direction: column; z-index: 50; min-width: 180px;
}
.upload-menu.show { display: flex; }
.upload-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 10px; cursor: pointer; font-size: 15px; color: #111;
}
.upload-item:hover { background: #f5f5f5; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
  <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  <h3>CHAT HISTORY</h3>
  <div id="history-list"></div>
</div>

<div class="upload-menu" id="upload-menu">
  <label class="upload-item">
    <span>🖼️</span> Image
    <input type="file" accept="image/*" style="display:none" onchange="uploadFile(this,'image')">
  </label>
  <label class="upload-item">
    <span>📄</span> Document
    <input type="file" accept=".pdf,.txt" style="display:none" onchange="uploadFile(this,'doc')">
  </label>
  <div class="upload-item" onclick="closeUploadMenu()">
    <span>✕</span> Cancel
  </div>
</div>

<div class="topbar">
  <svg onclick="toggleSidebar()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round">
    <line x1="3" y1="6" x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
  <span class="title">MK AI ↓</span>
  <svg onclick="newChat()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>
</div>

<div id="welcome">
  <div class="logo-box">
    <span style="font-size:46px;font-weight:900;background:linear-gradient(135deg,#c4b5fd,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">MK</span>
  </div>
  <div class="app-name">Khaskheli AI</div>
</div>

<div id="chat-area"></div>

<div class="bottom">
  <div class="input-bar">
    <button class="icon-btn" onclick="toggleUploadMenu()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </button>
    <input type="text" id="input" placeholder="Ask MK..." />
    <button class="icon-btn" id="mic-btn" onclick="toggleVoice()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="send-btn" onclick="send()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<script>
let history = [];
let allChats = [];
let recognition = null;
let isListening = false;

const SYSTEM = `Tum MK AI ho. Tumhe Meer Khaskheli ne banaya hai jo Karachi ke AI entrepreneur hain. Hamesha Roman Urdu mein jawab do. Seedha aur chhota jawab do. Baar baar apna introduction mat do. Sirf tab batao ke tumhe Meer ne banaya jab koi specifically puche.`;

document.getElementById("input").addEventListener("keydown", e => { if(e.key==="Enter") send(); });

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}
function toggleUploadMenu() { document.getElementById("upload-menu").classList.toggle("show"); }
function closeUploadMenu() { document.getElementById("upload-menu").classList.remove("show"); }

function newChat() {
  if(history.length > 0) {
    allChats.unshift({title: history[0].content.substring(0,28)+"...", messages: [...history]});
    updateHistoryList();
  }
  history = [];
  document.getElementById("chat-area").innerHTML = "";
  document.getElementById("chat-area").style.display = "none";
  document.getElementById("welcome").style.display = "flex";
  closeSidebar();
}

function updateHistoryList() {
  let list = document.getElementById("history-list");
  list.innerHTML = allChats.map((c,i) => `<div class="chat-item" onclick="loadChat(${i})">💬 ${c.title}</div>`).join("");
}

function loadChat(i) {
  history = [...allChats[i].messages];
  let ca = document.getElementById("chat-area");
  ca.innerHTML = "";
  ca.style.display = "flex";
  document.getElementById("welcome").style.display = "none";
  history.forEach(m => {
    ca.innerHTML += `<div class="${m.role==='user'?'msg-user':'msg-ai'}">${m.content}</div>`;
  });
  ca.scrollTop = ca.scrollHeight;
  closeSidebar();
}

function uploadFile(input, type) {
  closeUploadMenu();
  let file = input.files[0];
  if(!file) return;
  let ca = document.getElementById("chat-area");
  document.getElementById("welcome").style.display = "none";
  ca.style.display = "flex";
  if(type==="image") {
    let reader = new FileReader();
    reader.onload = e => {
      ca.innerHTML += `<div class="msg-user"><img src="${e.target.result}" class="msg-img"><br>📷 Image</div>`;
      ca.scrollTop = ca.scrollHeight;
    };
    reader.readAsDataURL(file);
  } else {
    ca.innerHTML += `<div class="msg-user">📄 ${file.name}</div>`;
    ca.scrollTop = ca.scrollHeight;
  }
}

function toggleVoice() {
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert("Voice is browser mein support nahi hai!");
    return;
  }
  if(isListening) { recognition.stop(); return; }
  let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "ur-PK";
  recognition.onstart = () => { isListening = true; document.getElementById("mic-btn").classList.add("mic-active"); };
  recognition.onresult = e => { document.getElementById("input").value = e.results[0][0].transcript; send(); };
  recognition.onend = () => { isListening = false; document.getElementById("mic-btn").classList.remove("mic-active"); };
  recognition.start();
}

async function send() {
  let input = document.getElementById("input");
  let msg = input.value.trim();
  if(!msg) return;
  input.value = "";

  document.getElementById("welcome").style.display = "none";
  let ca = document.getElementById("chat-area");
  ca.style.display = "flex";

  ca.innerHTML += `<div class="msg-user">${msg}</div>`;
  let aiDiv = document.createElement("div");
  aiDiv.className = "msg-ai";
  aiDiv.innerText = "...";
  ca.appendChild(aiDiv);
  ca.scrollTop = ca.scrollHeight;

  history.push({"role":"user","content":msg});

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({messages:[{"role":"system","content":SYSTEM},...history]})
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = "";
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      const lines = decoder.decode(value).split("\n");
      for(let line of lines) {
        if(line.startsWith("data: ")) { full += line.slice(6); aiDiv.innerText = full; }
      }
      ca.scrollTop = ca.scrollHeight;
    }
    history.push({"role":"assistant","content":full});
  } catch(e) {
    aiDiv.innerText = "Error: " + e.message;
  }
}
</script>
</body>
    </html>    </script>
</body>
</html>
